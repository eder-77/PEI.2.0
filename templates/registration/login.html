{% extends 'base.html' %}

{% block content %}
<div class="page-header">
  <h1>Connexion</h1>
  <p>Accédez à votre espace d'apprentissage intelligent.</p>
</div>

<section class="account-container" style="max-width: 450px;">
  <form method="post">
    {% csrf_token %}

    {% if form.errors %}
    <p style="color: #ff4d4d; text-align: center;">Identifiants incorrects. Réessayez.</p>
    {% endif %}

    <div class="form-group">
      <label>Nom d'utilisateur</label>
      {{ form.username }}
    </div>

    <div class="form-group">
      <label>Mot de passe</label>
      {{ form.password }}
    </div>

    <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">
      Se connecter
      </div>
  </form>
  <p style="text-align: center; margin-top: 20px; font-size: 0.9rem;">
    Pas encore de compte ? <a href="#" style="color: var(--primary-color);">Contactez l'administration</a>
  </p>
</section>
{% endblock %}
