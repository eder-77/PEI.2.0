{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="page-header">
  <h1>Mon Profil</h1>
</div>

<section class="account-container">
  <div
    style="display: flex; align-items: center; gap: 20px; margin-bottom: 40px; border-bottom: 1px solid var(--border-color); padding-bottom: 20px;">
    <i class="fas fa-user-circle fa-4x" style="color: var(--primary-color)"></i>
    <div>
      <h2 style="margin: 0;">{{ user.username }}</h2>
      <p style="color: var(--text-light); margin: 5px 0;">
        Membre depuis le : <strong>{{ user.date_joined|date:"d F Y" }}</strong>
      </p>
      <span class="badge"
        style="background: rgba(37, 99, 235, 0.1); color: var(--primary-color); padding: 4px 12px; border-radius: 15px; font-size: 0.8rem; font-weight: bold;">
        <i class="fas fa-graduation-cap"></i> Étudiant Actif
      </span>
    </div>
  </div>

  <form method="post">
    {% csrf_token %}
    ...
  </form>
</section>
{% endblock %}
